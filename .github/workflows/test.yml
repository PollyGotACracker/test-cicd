# ============================================================
# Preview, Production 테스트 워크플로우
# develop 또는 main 브랜치로 향하는 PR이 열리거나 업데이트될 때 실행
# ============================================================
name: Jest Tests

# 트리거 조건
on:
  pull_request:
    branches: [develop, main]

jobs:
  # ----------------------------------------------------------
  # "test"라는 이름의 job
  # Branch Protection의 Required Status Check에 등록 필요
  # ----------------------------------------------------------
  test:
    name: Run Jest
    runs-on: ubuntu-latest

    steps:
      # 1) 레포지토리 코드를 가상머신에 체크아웃
      - uses: actions/checkout@v4

      # 2) Node.js 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm" # 캐싱으로 설치 속도 향상

      # pnpm은 별도 설치 필요 (npm과 달리 기본 내장이 아님)
      - name: Install pnpm
        run: corepack enable pnpm

      # 3) 의존성 설치
      #    package-lock.json 기반 정확한 버전 설치(npm ci)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4) Jest 테스트 실행
      #    package.json의 "test" 스크립트 실행
      #    테스트 실패 시 PR merge 차단
      - name: Run tests
        run: pnpm test
        # env:
        # GitHub Secrets에 등록한 환경변수를 테스트 런타임에 주입
        # repo Settings → Secrets and variables → Actions에서 등록
        #    DATABASE_URL: ${{ secrets.DATABASE_URL }}
        #    API_KEY: ${{ secrets.API_KEY }}
