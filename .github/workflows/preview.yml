# ============================================================
# Preview 배포 워크플로우
# feature → develop 또는 develop → main PR에서 테스트 통과 후 실행
# ============================================================
name: Deploy Preview

# 트리거 조건
on:
  pull_request:
    branches: [develop, main]

# Vercel 인증에 필요한 환경변수
#
# VERCEL_ORG_ID:     .vercel/project.json의 "orgId" 값
# VERCEL_PROJECT_ID: .vercel/project.json의 "projectId" 값
# 둘 다 GitHub Secrets에 등록해야 함
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  test-and-deploy:
    name: Test & Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # 레포지토리 코드를 가상머신에 체크아웃
      - uses: actions/checkout@v4

      # pnpm 설치
      - name: Install pnpm
        run: corepack enable pnpm

      # Node.js 환경 설정 (pnpm 캐싱 사용)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      # 프로젝트 의존성 설치 (npm ci)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 테스트
      # 테스트가 통과하면 계속 실행, 실패하면 여기서 중단
      - name: Run tests
        run: pnpm test

      # Vercel CLI 설치
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Preview Build
      - name: Pull Vercel Environment
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # Preview Deploy
      # GITHUB_OUTPUT 환경변수에 url 저장
      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT

      # Preview URL 댓글 추가
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview: ${{ steps.deploy.outputs.url }}`
            })
